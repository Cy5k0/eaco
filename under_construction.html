<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sitio web en construcción. Estamos trabajando en algo increíble que estará disponible pronto.">
    <meta name="keywords" content="en construcción, under construction, sitio web, desarrollo">
    <meta name="robots" content="noindex, nofollow">
    <title>Sitio en Construcción | Coming Soon</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚧%3C/text%3E%3C/svg%3E">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Custom CSS (Regla 3 GEMINI.md) -->
    <link rel="stylesheet" href="assets/css/under-construction.css">

    <!-- Open Graph / Twitter Cards (Regla 4 GEMINI.md) -->
    <meta property="og:title" content="Próximamente - Escuela de Artes y Cultura">
    <meta property="og:description"
        content="Estamos preparando un nuevo espacio digital para nuestra comunidad educativa.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://www.escueladeartesycultura.com/assets/img/carousel_01.webp">
    <meta property="og:url" content="https://www.escueladeartesycultura.com/under_construction.html">
    <meta name="twitter:card" content="summary_large_image">

    <!-- SEO: JSON-LD WebPage para IA (Regla 4 GEMINI.md) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Próximamente - Escuela de Artes y Cultura",
      "description": "Página en construcción del nuevo sitio web institucional.",
      "mainEntity": {
        "@type": "CreativeWork",
        "name": "Sitio Web Institucional",
        "author": {
          "@type": "School",
          "name": "Escuela de Artes y Cultura",
          "url": "https://www.escueladeartesycultura.com"
        }
      }
    }
    </script>
</head>

<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <img src="assets/img/Logo.png" alt="Logo Escuela de Artes y Cultura">
        </div>

        <!-- Título principal -->
        <h1 class="main-title">EN CONSTRUCCIÓN</h1>

        <!-- Subtítulo -->
        <p class="subtitle">
            Estamos trabajando arduamente para ofrecerte una experiencia increíble.<br>
            ¡Nuestro sitio estará disponible muy pronto!
        </p>

        <!-- Imagen de construcción -->
        <div class="construction-image">
            <div class="barrier"></div>
            <div class="cones">
                <div class="cone"></div>
                <div class="cone"></div>
                <div class="cone"></div>
            </div>
        </div>

        <!-- Barra de progreso -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <!-- Puntos de carga -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Botón de regreso -->
        <a href="index.html" class="back-button" id="backBtn">
            🏠 Volver al Inicio
        </a>
    </div>

    <!-- Scripts externos con defer (Regla 3 GEMINI.md) -->
    <script src="assets/js/under-construction.js" defer></script>
</body>

</html>
